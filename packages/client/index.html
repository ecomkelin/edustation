<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FF8A65" />
    <title>EduStation · 校外培训家长端</title>
    <script>
      // rem 适配 (设计稿 750rpx)
      // 2026-07-01:不再 clamp 540,rootFontSize 直接跟随真实 viewport 宽度。
      // 让桌面端铺满整个屏幕,uni-app rpx 自动按设计稿等比缩放;
      // 同时去掉 #app 的 390px 手机壳,让真·全宽
      document.addEventListener('DOMContentLoaded', function () {
        var docEl = document.documentElement
        var resize = function () {
          var width = docEl.clientWidth || window.innerWidth
          docEl.style.fontSize = (width / 20) + 'px'
        }
        resize()
        window.addEventListener('resize', resize)
      })
    </script>
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #fffaf5;
        overflow-x: hidden;   /* 2026-07-01 防桌面端任何 rpx 元素溢出导致横向滚动 */
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'PingFang SC',
          'Helvetica Neue',
          'Microsoft YaHei',
          Arial,
          sans-serif;
        color: #2d2d2d;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* 桌面端渐变背景(无 #app 宽度约束) */
      @media (min-width: 541px) {
        body {
          background: linear-gradient(135deg, #fff5ed 0%, #ffe4d3 100%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
